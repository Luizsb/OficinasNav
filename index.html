<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Oficinas NAVE</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="assets/js/tailwind-config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="assets/css/nave.css"/>
</head>
<body class="bg-background text-on-surface font-body-md antialiased min-h-screen">
    <header class="border-b border-outline-variant bg-surface-container-lowest/95 backdrop-blur-sm sticky top-0 z-50">
        <div class="max-w-max-width mx-auto px-margin-mobile md:px-margin-desktop py-6 flex items-center justify-between gap-4">
            <div>
                <h1 class="text-headline-lg font-headline-lg text-primary">Oficinas NAVE</h1>
                <p class="text-body-md text-on-surface-variant mt-1">Guias de condução para educadores</p>
            </div>
            <span class="material-symbols-outlined text-primary-container text-4xl" style="font-variation-settings: 'FILL' 1;">school</span>
        </div>
    </header>

    <main class="max-w-max-width mx-auto px-margin-mobile md:px-margin-desktop py-12">
        <section class="mb-10 rounded-2xl bg-surface-container-low border border-outline-variant p-6 lg:p-8">
            <h2 class="text-headline-sm font-headline-sm text-primary mb-3">Apresentação</h2>
            <div class="space-y-4 max-w-2xl">
                <p class="text-body-lg text-on-surface-variant">
                    Selecione uma oficina para abrir o roteiro completo (Preparar, Criar, Refletir, materiais e dicas).
                </p>
                <!-- <p class="text-body-md text-on-surface-variant">
                    Cada oficina fica em sua pasta em <code class="text-sm bg-surface px-1.5 py-0.5 rounded">oficinas/nome-da-oficina/</code>, com <code class="text-sm bg-surface px-1.5 py-0.5 rounded">index.html</code>, <code class="text-sm bg-surface px-1.5 py-0.5 rounded">images/</code> e <code class="text-sm bg-surface px-1.5 py-0.5 rounded">fonte/</code>.
                </p> -->
            </div>
        </section>

        <div class="grid gap-6 md:grid-cols-2" id="lista-oficinas"></div>
    </main>

    <script type="application/json" id="oficinas-data">
[
    {
        "id": "o-espelho-tecnologico",
        "titulo": "O Espelho tecnológico",
        "subtitulo": "Tecnologia, design e programação com Scratch",
        "arquivo": "oficinas/o-espelho-tecnologico/index.html",
        "ano": "7º ano EFAF",
        "duracao": "90 min",
        "tags": ["Scratch", "Face Sensing", "Pensamento Computacional"]
    }
]
    </script>
    <script>
        function renderOficinas(oficinas) {
            var container = document.getElementById("lista-oficinas");
            container.innerHTML = "";
            oficinas.forEach(function (o) {
                var tags = (o.tags || []).map(function (t) {
                    return '<span class="text-label-sm bg-primary/10 text-primary px-2 py-0.5 rounded-full">' + t + "</span>";
                }).join(" ");

                var card = document.createElement("a");
                card.href = o.arquivo;
                card.className = "block bg-surface rounded-xl p-6 border border-outline-variant shadow-sm hover:shadow-md hover:border-primary-container smooth-transition group";
                card.innerHTML =
                    '<div class="flex items-start justify-between gap-4 mb-3">' +
                    '<h2 class="text-headline-md font-headline-md text-primary group-hover:text-primary-container">' + o.titulo + "</h2>" +
                    '<span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary">arrow_forward</span>' +
                    "</div>" +
                    '<p class="text-body-md text-on-surface-variant mb-4">' + o.subtitulo + "</p>" +
                    '<div class="flex flex-wrap gap-2 mb-4">' + tags + "</div>" +
                    '<p class="text-label-sm text-on-surface-variant">' + o.ano + " · " + o.duracao + "</p>";
                container.appendChild(card);
            });
        }

        var embedded = document.getElementById("oficinas-data");
        renderOficinas(JSON.parse(embedded.textContent));

        fetch("oficinas.json")
            .then(function (r) { return r.ok ? r.json() : null; })
            .then(function (oficinas) {
                if (oficinas && oficinas.length) {
                    renderOficinas(oficinas);
                }
            })
            .catch(function () { /* mantém dados embutidos */ });
    </script>
</body>
</html>
